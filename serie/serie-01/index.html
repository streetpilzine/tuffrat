<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Serie 01 — TuffRat</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <main style="max-width: 1200px; margin: 0 auto; padding: 2rem 1.25rem 3rem;">
    <h1>Serie 01</h1>
    <p style="color:#555; max-width:60ch;">
      Intro breve (80–120 parole): contesto, medium prevalente, periodo, cosa indaga la serie.
    </p>

    <section class="gallery" aria-label="Opere serie 01">
      <div class="grid">
        <figure class="card lightbox-trigger"
          data-title="Serie 01 — Opera 1"
          data-year="2024"
          data-tech="Tecniche miste su tela"
          data-size="60 x 60 cm"
          data-status="Su richiesta"
          data-link="">
          <img src="https://images.unsplash.com/photo-1496317899792-9d7dbcd928a1?auto=format&fit=crop&w=900&q=80" alt="Opera 1">
          <figcaption>Serie 01 — Opera 1 · 2024</figcaption>
        </figure>
        <figure class="card lightbox-trigger"
          data-title="Serie 01 — Opera 2"
          data-year="2024"
          data-tech="Acrilico su tela"
          data-size="70 x 100 cm"
          data-status="Disponibile online"
          data-link="https://example.com/acquista">
          <img src="https://images.unsplash.com/photo-1473181488821-2d23949a045a?auto=format&fit=crop&w=900&q=80" alt="Opera 2">
          <figcaption>Serie 01 — Opera 2 · 2024</figcaption>
        </figure>
        <!-- Aggiungi le altre opere (~10) -->
      </div>
    </section>
  </main>

  <!-- Lightbox (riuso lo stesso markup della home) -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox__backdrop" id="lightbox-backdrop"></div>
    <div class="lightbox__content">
      <button class="lightbox__close" id="lightbox-close" aria-label="Chiudi">×</button>
      <div class="lightbox__img-wrap">
        <img id="lightbox-img" src="" alt="">
      </div>
      <div class="lightbox__meta">
        <h3 id="lb-title">Titolo</h3>
        <p id="lb-year">Anno</p>
        <p id="lb-tech">Tecnica</p>
        <p id="lb-size">Dimensioni</p>
        <p id="lb-status">Status</p>
        <p id="lb-link"></p>
      </div>
      <div class="lightbox__nav">
        <button id="lb-prev" aria-label="Precedente">←</button>
        <button id="lb-next" aria-label="Successivo">→</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/script.js"></script>
</body>
</html>
